services:
  - type: web
    name: ai-lms-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: lumina_lms
      - key: MONGODB_TIMEOUT_MS
        value: "10000"
      - key: MONGODB_CONNECT_ATTEMPTS
        value: "5"
      - key: MONGODB_RETRY_DELAY_SECONDS
        value: "2"
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
